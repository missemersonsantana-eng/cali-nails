<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cali Nails - Agendamento</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff4da6, #ff85c1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #ff4da6;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #ff4da6;
    }

    h3 {
      margin-bottom: 10px;
      color: #333;
    }

    #horarios {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    #horarios button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #f1f1f1;
      cursor: pointer;
      transition: 0.2s;
    }

    #horarios button:hover {
      background: #ffd6eb;
    }

    #horarios button.selecionado {
      background: #ff4da6;
      color: white;
    }

    #horarios button:disabled {
      background: #ddd;
      cursor: not-allowed;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4da6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button[type="submit"]:hover {
      background: #e60073;
    }

    #mensagem {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Agendar 💅</h1>

<form id="formAgendamento">

  <label>Seu nome</label>
  <input type="text" id="nome" placeholder="Digite seu nome" required>

  <label>Serviço</label>
  <select id="servico" required>
    <option value="">Selecione um serviço</option>
  </select>

  <label>Data</label>
  <input type="date" id="data" required>

  <h3>Horários disponíveis</h3>
  <div id="horarios"></div>

  <input type="hidden" id="horaSelecionada">

  <button type="submit">Confirmar Agendamento</button>

  <p id="mensagem"></p>
</form>

  </div>

  <script type="module" src="js/agendamento.js"></script>

</body>
</html>
