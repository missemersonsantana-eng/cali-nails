<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cali Nails - Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff4da6, #ff85c1);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #ff4da6;
    }

    p {
      margin-bottom: 20px;
      color: #777;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #ff4da6;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ff4da6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e60073;
    }

    .secondary {
      margin-top: 10px;
      background: #f1f1f1;
      color: #333;
    }

    .secondary:hover {
      background: #ddd;
    }

    #mensagem {
      margin-top: 15px;
      font-size: 14px;
      color: red;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Cali Nails 💅</h1>
    <p>Entre para continuar</p>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">



<button id="btnLogin">Entrar</button>
<button id="btnCadastro" class="secondary">Criar conta</button>

<p id="mensagem" style="min-height: 20px;"></p>

  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
