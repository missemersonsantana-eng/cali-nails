<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar - Cali Nails</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff4da6, #ff85c1);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ff4da6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      color: #ff4da6;
      text-decoration: none;
    }

    #mensagem {
      margin-top: 10px;
      font-size: 10px;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Criar Conta 💅</h1>

<input type="text" id="nome" placeholder="Seu nome">
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<input type="password" id="confirmarSenha" placeholder="Confirmar senha">

<button id="btnCadastro">Cadastrar</button>

<p style="margin-top:10px;">
  Já tem conta? <a href="login.html">Fazer login</a>
</p>

<p id="mensagem"></p>

  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
